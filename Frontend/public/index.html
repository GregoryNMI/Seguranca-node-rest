<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="../css/index.css">
    <meta charset="utf-8">
    <title>Olá</title>
</head>
<body>

<div class="container">

    <h1>Cadastro</h1>

    <form action="/salvar" method="post">

        <label>Nome:</label>
        <input type="text" id="nome" name="nome">

        <label>Telefone:</label>
        <input type="tel" id="telefone" name="telefone">

        <label>E-mail:</label>
        <input type="email" id="email" name="email">

        <label>Endereço Web:</label>
        <input type="url" id="enderecoweb" name="enderecoweb">

        <label for="experiencia">Conte sua experiência:</label>

        <textarea
            id="experiencia"
            name="experiencia"
            rows="6"
            placeholder="Digite aqui os detalhes da sua experiência..."
        ></textarea>

        <input type="submit" value="Enviar">

    </form>

    <a href="Pesquisa.html">
        Ver usuários cadastrados
    </a>

</div>

</body>

</body>
</html>
