<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Olá</title>
</head>
<body>

     <h1>Cadastro</h1>

    <form action="/salvar" method="post">
        
        <label>Nome:</label>
            <input type="text" id="nome" name="nome">
        <br><br>

        <label>Telefone:</label>
            <input type="tel" id="telefone" name="telefone">
        <br><br>

        <label>E-mail:</label>
            <input type="email" id="email" name="email">
        <br><br>

        <label>Endereço Web:</label>
            <input type="url" id="Endereço" name="Endereço">
        <br><br>

        <label for="experiencia">Conte sua experiência:</label>
          <textarea 
                id="experiencia" 
                name="experiencia" 
                rows="6" 
                cols="50" 
                placeholder="Digite aqui os detalhes da sua experiência...">
          </textarea>

        

        <input type="submit" value="Enviar">

    </form>

    
 <a href="Pesquisa.html">
    Ver usuários cadastrados
</a>

</body>
</html>
