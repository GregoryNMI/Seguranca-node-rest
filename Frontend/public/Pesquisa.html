<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar Usuários</title>
    <link rel="stylesheet" href="../css/Pesquisa.css">
</head>

<body>

<div class="container">
    <h1>Pesquisar Usuários</h1>

   <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">

    <input
        type="text"
        id="campoPesquisa"
        placeholder="Digite nome, email ou telefone"
        style="
            width:400px;
            padding:14px 20px;
            border:none;
            border-radius:10px;
            font-size:16px;
            background:#ececec;
            color:#333;
            outline:none;
            box-shadow:0 0 8px rgba(0,0,0,0.2);
        "
    >

    <button
        onclick="pesquisarUsuario()"
        style="
            background:#008cff;
            color:white;
            border:none;
            padding:14px 25px;
            border-radius:10px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        ">
        Pesquisar
    </button>

    <a
        href="index.html"
        style="
            background:#555;
            color:white;
            text-decoration:none;
            padding:14px 25px;
            border-radius:10px;
            font-size:16px;
            font-weight:bold;
            display:inline-block;
        ">
        ← Voltar para Cadastro
    </a>

</div>

    <div class="mensagem" id="mensagem"></div>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Endereço Web</th>
                <th>Experiência</th>
            </tr>
        </thead>

        <tbody id="tabelaUsuarios">
        </tbody>
    </table>

    <script>

    // evita XSS no front (mesmo conceito do backend)
    function limparTexto(texto) {
        return String(texto || "")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    async function pesquisarUsuario() {

        try {

            const termo =
                document.getElementById("campoPesquisa").value || "";

            const resposta =
                await fetch(`/pesquisar?termo=${encodeURIComponent(termo)}`);

            const usuarios =
                await resposta.json();

            const tabela =
                document.getElementById("tabelaUsuarios");

            const mensagem =
                document.getElementById("mensagem");

            tabela.innerText = "";
            mensagem.innerText = "";

            if (!usuarios || usuarios.length === 0) {
                mensagem.innerText = "Nenhum usuário encontrado.";
                return;
            }

            usuarios.forEach(usuario => {

                tabela.innerText += `
                    <tr>
                        <td>${limparTexto(usuario.nome)}</td>
                        <td>${limparTexto(usuario.email)}</td>
                        <td>${limparTexto(usuario.telefone)}</td>
                        <td>${limparTexto(usuario.enderecoweb)}</td>
                        <td>${limparTexto(usuario.experiencia)}</td>
                    </tr>
                `;

            });

        } catch (erro) {

            console.error(erro);

            document.getElementById("mensagem").innerText =
                "Erro ao pesquisar usuários.";

        }

    }

    document
        .getElementById("campoPesquisa")
        .addEventListener("keypress", function(event) {

            if (event.key === "Enter") {
                pesquisarUsuario();
            }

        });

</script>
</div>
</body>
</html>
