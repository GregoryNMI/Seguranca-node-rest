<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pesquisar Usuários</title>

    <link rel="stylesheet" href="../css/Pesquisa.css">

</head>

<body>

<div class="container">

    <h1>Pesquisar Usuários</h1>

    <div class="barraPesquisa">

        <input
            type="text"
            id="campoPesquisa"
            placeholder="Digite nome ou email">

        <button onclick="pesquisarUsuario()">
            Pesquisar
        </button>

        <a href="index.html" class="btnVoltar">
            ← Voltar para Cadastro
        </a>

    </div>

    <div class="mensagem" id="mensagem"></div>

    <table>

        <thead>

            <tr>

                <th>Nome</th>
                <th>Email</th>
                <th>Ações</th>

            </tr>

        </thead>

        <tbody id="tabelaUsuarios"></tbody>

    </table>

</div>


<div id="modalUsuario" class="modal">

    <div class="modal-content">

        <span class="fechar" onclick="fecharModal()">&times;</span>

        <h2>Informações do Candidato</h2>

        <div class="campo">

            <label>Nome</label>

            <input
                type="text"
                id="modalNome"
                readonly>

        </div>

        <div class="campo">

            <label>Email</label>

            <input
                type="text"
                id="modalEmail"
                readonly>

        </div>

        <div class="campo">

            <label>Telefone</label>

            <input
                type="text"
                id="modalTelefone"
                readonly>

        </div>

        <div class="campo">

            <label>Endereço Web</label>

            <input
                type="text"
                id="modalEndereco"
                readonly>

        </div>

        <div class="campo">

            <label>Experiência</label>

            <textarea
                id="modalExperiencia"
                rows="8"
                readonly></textarea>

        </div>

    </div>

</div>

<script>

let usuariosCache = [];

function limparTexto(texto){

    return String(texto || "")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");

}

async function pesquisarUsuario(){

    try{

        const termo =
            document.getElementById("campoPesquisa").value;

        const resposta =
            await fetch(`/pesquisar?termo=${encodeURIComponent(termo)}`);

        const usuarios =
            await resposta.json();

        usuariosCache = usuarios;

        const tabela =
            document.getElementById("tabelaUsuarios");

        const mensagem =
            document.getElementById("mensagem");

        tabela.innerHTML = "";
        mensagem.innerHTML = "";

        if(!usuarios.length){

            mensagem.innerHTML =
                "Nenhum usuário encontrado.";

            return;

        }

        usuarios.forEach((usuario, indice)=>{

            tabela.innerHTML += `

            <tr>

                <td>${limparTexto(usuario.nome)}</td>

                <td>${limparTexto(usuario.email)}</td>

                <td>

                    <button
                        class="btnDetalhes"
                        onclick="abrirModal(${indice})">

                        Ver detalhes

                    </button>

                </td>

            </tr>

            `;

        });

    }

    catch(erro){

        console.error(erro);

        document.getElementById("mensagem").innerHTML =
            "Erro ao pesquisar usuários.";

    }

}

function abrirModal(indice){

    const usuario = usuariosCache[indice];

    if(!usuario){
        return;
    }

    document.getElementById("modalNome").value =
        usuario.nome || "";

    document.getElementById("modalEmail").value =
        usuario.email || "";

    document.getElementById("modalTelefone").value =
        usuario.telefone || "";

    document.getElementById("modalEndereco").value =
        usuario.enderecoweb || "";

    document.getElementById("modalExperiencia").value =
        usuario.experiencia || "";

    document.getElementById("modalUsuario").style.display =
        "flex";

}

function fecharModal(){

    document.getElementById("modalUsuario").style.display =
        "none";

}

window.onclick = function(event){

    const modal =
        document.getElementById("modalUsuario");

    if(event.target === modal){

        fecharModal();

    }

}

document
.getElementById("campoPesquisa")
.addEventListener("keypress",function(event){

    if(event.key==="Enter"){

        pesquisarUsuario();

    }

});

pesquisarUsuario();

</script>

</body>

</html>
