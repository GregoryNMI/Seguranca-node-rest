<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar Usuários</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            color: #333;
        }

        input {
            padding: 8px;
            width: 300px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        .mensagem {
            margin-top: 15px;
            color: red;
        }
    </style>
</head>

<body>

    <h1>Pesquisar Usuários</h1>

    <input
        type="text"
        id="campoPesquisa"
        placeholder="Digite nome, email ou telefone"
    >

    <button onclick="pesquisarUsuario()">
        Pesquisar
    </button>

    <div class="mensagem" id="mensagem"></div>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Endereço Web</th>
                <th>Experiência</th>
            </tr>
        </thead>

        <tbody id="tabelaUsuarios">
        </tbody>
    </table>

    <script>

        async function pesquisarUsuario() {

            try {

                const termo =
                    document.getElementById("campoPesquisa").value;

                const resposta =
                    await fetch(`/pesquisar?termo=${encodeURIComponent(termo)}`);

                const usuarios =
                    await resposta.json();

                const tabela =
                    document.getElementById("tabelaUsuarios");

                const mensagem =
                    document.getElementById("mensagem");

                tabela.innerHTML = "";
                mensagem.innerHTML = "";

                if (usuarios.length === 0) {

                    mensagem.innerHTML =
                        "Nenhum usuário encontrado.";

                    return;
                }

                usuarios.forEach(usuario => {

                    tabela.innerHTML += `
                        <tr>
                            <td>${usuario.nome || ""}</td>
                            <td>${usuario.email || ""}</td>
                            <td>${usuario.telefone || ""}</td>
                            <td>${usuario.enderecoweb || ""}</td>
                            <td>${usuario.experiencia || ""}</td>
                        </tr>
                    `;

                });

            } catch (erro) {

                console.error(erro);

                document.getElementById("mensagem").innerHTML =
                    "Erro ao pesquisar usuários.";

            }

        }

        document
            .getElementById("campoPesquisa")
            .addEventListener("keypress", function(event) {

                if (event.key === "Enter") {
                    pesquisarUsuario();
                }

            });

    </script>

</body>
</html>
